      { id: '92', name: 'tedunangst.com', url: 'https://www.tedunangst.com/flak/rss' }
    ];

    function App() {
      const [feeds, setFeeds] = useState(DEFAULT_FEEDS);
      const [activeFeed, setActiveFeed] = useState(DEFAULT_FEEDS[0]);
      const [articles, setArticles] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [newFeedUrl, setNewFeedUrl] = useState('');
      const [showImport, setShowImport] = useState(false);
      const [importUrl, setImportUrl] = useState('https://ztow.me/rss/');
      const [readingArticle, setReadingArticle] = useState(null);

      const fetchFeed = async (feed) => {
        if (!feed) return;
        setLoading(true);
        setError(null);
        setArticles([]);

        try {
          const response = await fetch(`${RSS_API}${encodeURIComponent(feed.url)}&_=${new Date().getTime()}`);
          const data = await response.json();

          if (data.status === 'ok') {
            setArticles(data.items);
          } else {
            throw new Error(data.message || '无法解析该 RSS 源');
          }
        } catch (err) {
          setError('抓取失败，该 RSS 源可能不支持或存在跨域拦截。');
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchFeed(activeFeed);
      }, [activeFeed]);

      const handleAddFeed = (e) => {
        e.preventDefault();
        if (!newFeedUrl) return;
        if (feeds.some(f => f.url === newFeedUrl)) { setNewFeedUrl(''); return; }
        const newFeed = { id: Date.now().toString(), name: new URL(newFeedUrl).hostname.replace('www.', ''), url: newFeedUrl };
        setFeeds([newFeed, ...feeds]);
        setActiveFeed(newFeed);
        setNewFeedUrl('');
      };

      const removeFeed = (e, id) => {
        e.stopPropagation();
        const updated = feeds.filter(f => f.id !== id);
        setFeeds(updated);
        if (activeFeed && activeFeed.id === id) {
          setActiveFeed(updated.length > 0 ? updated[0] : null);
        }
      };

      const extractFeedsFromUrl = async (e) => {
        e.preventDefault();
        if (!importUrl) return;
        setLoading(true);
        setError(null);
        try {
          const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(importUrl)}`);
          if (!response.ok) throw new Error('无法访问该网页');
          const text = await response.text();
          
          let extractedFeeds = [];
          const parser = new DOMParser();

          if (text.includes('<opml') || text.includes('<outline')) {
            const xmlDoc = parser.parseFromString(text, "text/xml");
            const outlines = xmlDoc.querySelectorAll('outline[xmlUrl]');
            outlines.forEach((node, idx) => {
              extractedFeeds.push({ id: `ext-opml-${idx}`, name: node.getAttribute('title') || node.getAttribute('text') || '未命名源', url: node.getAttribute('xmlUrl') });
            });
          } else {
            const doc = parser.parseFromString(text, "text/html");
            const baseUrl = new URL(importUrl);
            const headLinks = doc.querySelectorAll('link[type="application/rss+xml"], link[type="application/atom+xml"]');
            headLinks.forEach((link, idx) => {
              let href = link.getAttribute('href');
              if (href) {
                href = href.startsWith('http') ? href : new URL(href, baseUrl.origin).href;
                extractedFeeds.push({ id: `ext-head-${idx}`, name: link.getAttribute('title') || baseUrl.hostname, url: href });
              }
            });
            const aTags = doc.querySelectorAll('a');
            aTags.forEach((a, idx) => {
              let href = a.getAttribute('href');
              if (href && (href.endsWith('.xml') || href.includes('rss') || href.includes('feed'))) {
                if (!href.startsWith('mailto:') && !href.startsWith('javascript:')) {
                  href = href.startsWith('http') ? href : new URL(href, baseUrl.origin).href;
                  extractedFeeds.push({ id: `ext-a-${idx}`, name: a.textContent.trim() || new URL(href).hostname, url: href });
                }
              }
            });
          }

          const uniqueFeeds = Array.from(new Map(extractedFeeds.map(item => [item.url, item])).values());

          if (uniqueFeeds.length > 0) {
            setFeeds(uniqueFeeds);
            setActiveFeed(uniqueFeeds[0]);
            setShowImport(false);
          } else {
            setError('未能在该网页中找到明显的 RSS 链接。');
          }
        } catch (err) {
          setError('网页提取失败，可能存在跨域拦截。');
        } finally {
          setLoading(false);
        }
      };

      const getThumbnail = (article) => {
        if (article.thumbnail) return article.thumbnail;
        if (article.enclosure && article.enclosure.link) return article.enclosure.link;
        const imgRegex = /<img[^>]+src="([^">]+)"/g;
        const match = imgRegex.exec(article.content || article.description);
        return match ? match[1] : null;
      };

      const formatDate = (dateString) => {
        const options = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        return new Date(dateString).toLocaleDateString('zh-CN', options);
      };

      if (readingArticle) {
        return (
          <div className="h-full w-full bg-slate-950 text-slate-200 overflow-y-auto custom-scrollbar relative">
            <div className="sticky top-0 bg-slate-900/90 backdrop-blur-md p-4 flex items-center justify-between border-b border-slate-800 z-10 px-8">
              <button 
                onClick={() => setReadingArticle(null)}
                className="flex items-center gap-2 text-slate-400 hover:text-cyan-400 transition-colors px-3 py-1.5 rounded-lg hover:bg-slate-800 bg-transparent outline-none cursor-pointer"
              >
                <i className="fa-solid fa-chevron-left"></i> 返回列表
              </button>
              <a 
                href={readingArticle.link} 
                target="_blank" 
                rel="noopener noreferrer"
                className="flex items-center gap-2 text-sm bg-cyan-500/10 text-cyan-400 hover:bg-cyan-500/20 px-4 py-2 rounded-full transition-colors no-underline"
              >
                原文链接 <i className="fa-solid fa-external-link-alt"></i>
              </a>
            </div>

            <div className="max-w-4xl mx-auto p-8 pb-12">
              <h1 className="text-3xl md:text-4xl font-bold text-slate-50 mb-6 leading-tight mt-4">
                {readingArticle.title}
              </h1>
              <div className="flex flex-wrap items-center gap-4 text-sm text-slate-400 mb-8 pb-6 border-b border-slate-800/50">
                <span className="flex items-center gap-1"><i className="fa-regular fa-clock"></i> {formatDate(readingArticle.pubDate)}</span>
                {readingArticle.author && <span className="flex items-center gap-1"><i className="fa-solid fa-user-pen"></i> {readingArticle.author}</span>}
              </div>

              <div className="prose prose-invert prose-cyan max-w-none 
                prose-headings:font-bold prose-a:text-cyan-400 hover:prose-a:text-cyan-300
                prose-img:rounded-xl prose-img:shadow-lg prose-img:w-full prose-img:object-cover text-base leading-relaxed"
                dangerouslySetInnerHTML={{ __html: readingArticle.content || readingArticle.description }}
              />
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-full w-full bg-slate-950 text-slate-200 font-sans overflow-hidden text-left">
          
          {/* 左侧边栏 */}
          <div className="w-72 bg-slate-900/50 border-r border-slate-800 flex flex-col backdrop-blur-xl z-10 flex-shrink-0">
            <div className="p-6">
              <h1 className="text-2xl font-black bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent flex items-center gap-3 m-0">
                <i className="fa-solid fa-bolt text-cyan-400"></i>
                世界视野
              </h1>
              <p className="text-xs text-slate-500 mt-2 tracking-wider m-0">MODERN RSS READER</p>
            </div>

            <div className="px-4 pb-4">
              <form onSubmit={handleAddFeed} className="relative m-0">
                <input 
                  type="url" 
                  placeholder="直接输入 RSS 链接..." 
                  value={newFeedUrl}
                  onChange={(e) => setNewFeedUrl(e.target.value)}
                  className="w-full bg-slate-950 border border-slate-800 rounded-xl py-2.5 pl-4 pr-10 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 transition-all m-0 box-border"
                  required
                />
                <button type="submit" className="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-cyan-400 transition-colors bg-transparent border-none cursor-pointer">
                  <i className="fa-solid fa-plus"></i>
                </button>
              </form>

              <button 
                onClick={() => setShowImport(!showImport)}
                className="w-full mt-3 flex items-center justify-center gap-2 text-xs font-medium text-cyan-400/80 hover:text-cyan-400 bg-cyan-500/10 hover:bg-cyan-500/20 py-2 rounded-lg transition-colors border border-cyan-500/20 cursor-pointer"
              >
                <i className="fa-solid fa-cloud-download-alt"></i>
                一键导入网页/博客源
              </button>
            </div>

            {showImport && (
              <div className="px-4 pb-4 mb-2">
                <div className="bg-slate-950 border border-cyan-500/30 rounded-xl p-3 relative">
                  <button 
                    onClick={() => setShowImport(false)}
                    className="absolute top-2 right-2 text-slate-500 hover:text-slate-300 bg-transparent border-none cursor-pointer"
                  >
                    <i className="fa-solid fa-times"></i>
                  </button>
                  <h3 className="text-xs font-bold text-slate-300 mb-2 mt-0">嗅探页面 RSS</h3>
                  <form onSubmit={extractFeedsFromUrl} className="flex flex-col gap-2 m-0">
                    <input 
                      type="url" 
                      value={importUrl}
                      onChange={(e) => setImportUrl(e.target.value)}
                      className="w-full bg-slate-900 border border-slate-700 rounded-lg py-1.5 px-3 text-xs text-slate-200 focus:outline-none focus:border-cyan-500/50 box-border m-0"
                      required
                    />
                    <button 
                      type="submit"
                      disabled={loading}
                      className="w-full bg-cyan-600 hover:bg-cyan-500 text-white text-xs py-1.5 rounded-lg transition-colors flex items-center justify-center gap-2 border-none cursor-pointer"
                    >
                      {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : '开始提取'}
                    </button>
                  </form>
                </div>
              </div>
            )}

            <div className="flex-1 overflow-y-auto px-3 space-y-1 custom-scrollbar pb-4">
              <div className="text-xs font-bold text-slate-600 mb-3 px-3 uppercase tracking-wider">共 {feeds.length} 个订阅源</div>
              {feeds.map(feed => (
                <div 
                  key={feed.id}
                  onClick={() => setActiveFeed(feed)}
                  className={`group flex items-center justify-between px-3 py-3 rounded-xl cursor-pointer transition-all duration-200 border border-solid
                    ${activeFeed?.id === feed.id 
                      ? 'bg-gradient-to-r from-cyan-500/10 to-blue-500/10 border-cyan-500/20 text-cyan-400' 
                      : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200 border-transparent'}`}
                >
                  <div className="flex items-center gap-3 overflow-hidden">
                    <i className={`fa-solid fa-rss text-xs ${activeFeed?.id === feed.id ? 'text-cyan-400' : 'text-slate-600'}`}></i>
                    <span className="truncate text-sm font-medium">{feed.name}</span>
                  </div>
                  <button 
                    onClick={(e) => removeFeed(e, feed.id)}
                    className="opacity-0 group-hover:opacity-100 p-1 text-slate-500 hover:text-red-400 transition-all rounded-md hover:bg-red-400/10 bg-transparent border-none cursor-pointer"
                  >
                    <i className="fa-solid fa-trash text-xs"></i>
                  </button>
                </div>
              ))}
            </div>
          </div>

          {/* 右侧主内容区 */}
          <div className="flex-1 flex flex-col bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-slate-950 relative overflow-hidden">
            
            <header className="h-20 border-b border-slate-800/50 flex items-center justify-between px-8 bg-slate-950/20 backdrop-blur-sm relative z-10 flex-shrink-0">
              <div>
                <h2 className="text-xl font-bold text-slate-200">{activeFeed?.name || '请选择订阅源'}</h2>
                <p className="text-xs text-slate-500">{articles.length} 篇文章</p>
              </div>
              <div className="flex items-center gap-3">
                <button 
                  onClick={() => fetchFeed(activeFeed)}
                  disabled={loading}
                  className={`flex items-center gap-2 text-sm font-medium px-4 py-2 rounded-full transition-colors border-none cursor-pointer
                    ${loading 
                      ? 'bg-slate-800 text-slate-500' 
                      : 'bg-cyan-600 hover:bg-cyan-500 text-white shadow-lg shadow-cyan-500/20'}`}
                >
                  <i className={`fa-solid fa-sync-alt ${loading ? 'fa-spin' : ''}`}></i>
                  刷新
                </button>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto p-8 custom-scrollbar relative z-10">
              {error && (
                <div className="p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-sm flex items-center gap-3 mb-6">
                  <i className="fa-solid fa-triangle-exclamation"></i> {error}
                </div>
              )}

              {!activeFeed && !error && (
                <div className="h-full flex flex-col items-center justify-center text-slate-500">
                  <i className="fa-solid fa-rss text-5xl mb-4 opacity-20"></i>
                  <p>请在左侧选择或添加一个 RSS 源</p>
                </div>
              )}

              {loading && articles.length === 0 && (
                <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
                  {[1, 2, 3, 4, 5, 6].map(i => (
                    <div key={i} className="animate-pulse bg-slate-800/50 border border-slate-800 rounded-2xl h-80"></div>
                  ))}
                </div>
              )}

              <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6 auto-rows-max">
                {articles.map((article, index) => {
                  const thumbnail = getThumbnail(article);
                  const snippet = article.description ? article.description.replace(/<[^>]+>/g, '').substring(0, 100) + '...' : '暂无摘要';

                  return (
                    <div 
                      key={index}
                      onClick={() => setReadingArticle(article)}
                      className="group bg-slate-900/60 border border-slate-800 hover:border-cyan-500/40 rounded-2xl overflow-hidden cursor-pointer hover:-translate-y-1 transition-all duration-300 shadow-lg hover:shadow-cyan-500/10 flex flex-col h-[380px]"
                    >
                      <div className="h-44 bg-slate-800 relative overflow-hidden flex-shrink-0">
                        {thumbnail ? (
                          <img 
                            src={thumbnail} 
                            alt="封面" 
                            className="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500"
                            onError={(e) => { e.target.style.display = 'none'; }} 
                          />
                        ) : (
                          <div className="w-full h-full flex items-center justify-center text-slate-700 group-hover:text-cyan-900 transition-colors">
                            <i className="fa-solid fa-newspaper text-5xl"></i>
                          </div>
                        )}
                        <div className="absolute inset-0 bg-gradient-to-t from-slate-900/95 via-slate-900/20 to-transparent"></div>
                        
                        {article.categories && article.categories.length > 0 && (
                          <div className="absolute bottom-3 left-4">
                            <span className="px-2 py-1 text-[10px] font-bold uppercase tracking-wider bg-cyan-600 text-white rounded shadow-md">
                              {article.categories[0]}
                            </span>
                          </div>
                        )}
                      </div>

                      <div className="p-5 flex flex-col flex-1">
                        <h3 className="text-base font-bold text-slate-100 line-clamp-2 leading-snug group-hover:text-cyan-400 transition-colors m-0">
                          {article.title}
                        </h3>
                        <p className="text-sm text-slate-400 mt-3 line-clamp-3 leading-relaxed flex-1 mb-0">
                          {snippet}
                        </p>
                        
                        <div className="flex items-center justify-between mt-4 pt-3 border-t border-slate-800/80">
                          <span className="text-xs text-slate-500 font-medium">
                            {formatDate(article.pubDate)}
                          </span>
                          <span className="text-cyan-500 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300">
                            阅读 <i className="fa-solid fa-arrow-right text-xs ml-1"></i>
                          </span>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('rss-root'));
    root.render(<App />);
  </script>
{% endraw %}

</body>
</html>
